name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: Fakka # هنا السحر! السيرفر حيدخل للمجلد الصح

      - name: Build APK
        run: flutter build apk --release
        working-directory: Fakka # وهنا برضه عشان يبني من جوة المجلد

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: Fakka/build/app/outputs/flutter-apk/app-release.apk # المسار الجديد للملف
