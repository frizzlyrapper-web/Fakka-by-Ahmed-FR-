name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          TARGET_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          echo "Found Flutter project root at: $TARGET_DIR"
          cd $TARGET_DIR
          flutter pub get

      - name: Build APK
        run: |
          TARGET_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          cd $TARGET_DIR
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
