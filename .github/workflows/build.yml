name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # السحر هنا: بيعمل مشروع في السيرفر وينقل ملفاتك من الواجهة مباشرة جوا lib
      - name: Create Scratch Flutter Project
        run: |
          flutter create running_project --org com.fakka.ahmed
          cd running_project
          flutter pub add nfc_manager
          cp ../main.dart lib/main.dart
          cp ../pubspec.yaml pubspec.yaml

      - name: Build APK
        run: |
          cd running_project
          flutter pub get
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "running_project/build/app/outputs/flutter-apk/app-release.apk"
