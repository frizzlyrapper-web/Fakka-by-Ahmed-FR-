name: Build Flutter APK From Single File

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # خطوة السحر: إنشاء بيئة فلاتر كاملة داخل السيرفر وتثبيت مكتبة الـ NFC
      - name: Create Scratch Flutter Project
        run: |
          flutter create running_project --org com.fakka.ahmed
          cd running_project
          flutter pub add nfc_manager

      # خطوة نقل كودك الخاص إلى داخل المشروع الجديد ليتم بناؤه
      - name: Inject Ahmed Code
        run: |
          cp Fakka running_project/lib/main.dart

      # بناء الـ APK الفعلي
      - name: Build APK
        run: |
          cd running_project
          flutter build apk --release

      # رفع الملف النهائي لتحميله
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "running_project/build/app/outputs/flutter-apk/app-release.apk"
